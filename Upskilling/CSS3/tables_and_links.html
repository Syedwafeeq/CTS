<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Styling Demo</title>

    <style>
        body {
            font-family: Verdana, sans-serif;
            margin: 20px;
        }

        h1 {
            color: darkblue;
            text-align: center;
        }

        a {
            color: green;
            text-decoration: none;
        }

        a:hover {
            color: red;
            text-decoration: underline;
        }

        ul {
            background-color: #f0f0f0;
            padding: 15px;
        }

        table {
            border-collapse: collapse;
            width: 70%;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightblue;
        }
    </style>
</head>
<body>

    <h1>CSS Styling Example</h1>

    <p>
        Visit
        <a href="https://www.w3schools.com" target="_blank">
            W3Schools
        </a>
        for learning resources.
    </p>

    <h2>Technologies</h2>

    <ul>
        <li>HTML5</li>
        <li>CSS3</li>
        <li>JavaScript</li>
        <li>C#</li>
    </ul>

    <h2>Student Scores</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Score</th>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>HTML5</td>
            <td>92</td>
        </tr>

        <tr>
            <td>Ananya</td>
            <td>CSS3</td>
            <td>95</td>
        </tr>

        <tr>
            <td>Vikram</td>
            <td>JavaScript</td>
            <td>90</td>
        </tr>
    </table>

    <footer>
        <p>&copy; 2026 CH Jaswanth</p>
    </footer>

</body>
</html>
