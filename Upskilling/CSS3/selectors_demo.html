<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors Demo</title>

    <style>
        h1 {
            color: navy;
        }

        .highlight {
            background-color: lightyellow;
        }

        #special {
            color: darkgreen;
            font-weight: bold;
        }

        h2, p {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <h1>CSS3 Selectors</h1>

    <h2>Element Selector Example</h2>

    <p class="highlight">
        This paragraph uses a class selector.
    </p>

    <p id="special">
        This paragraph uses an ID selector.
    </p>

    <p style="color: crimson;">
        This paragraph uses inline CSS.
    </p>

    <footer>
        <p>&copy; 2026 CH Jaswanth</p>
    </footer>

</body>
</html>
